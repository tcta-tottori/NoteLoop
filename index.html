<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="color-scheme" content="light dark" />
  <title>NoteLoop — 議事録自動化</title>
  <meta name="description" content="ブラウザだけで完結する議事録自動化アプリ。録音 → 文字起こし → 議事録整形 → 音声 / txt / Word / メール下書きで出力。" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="bg-orbs" aria-hidden="true"></div>

  <header class="app-header">
    <div class="brand">
      <span class="brand-mark" aria-hidden="true">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2a3 3 0 0 0-3 3v6a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"/>
          <path d="M19 10v1a7 7 0 0 1-14 0v-1"/>
          <path d="M12 18v4"/>
        </svg>
      </span>
      <div class="brand-text">
        <h1>NoteLoop</h1>
        <p>録音 → 文字起こし → 議事録 → 出力を、ブラウザだけで</p>
      </div>
    </div>
    <button id="settingsToggle" class="ghost-btn" type="button" aria-expanded="false" aria-controls="settingsPanel">
      <span aria-hidden="true">⚙</span><span class="btn-label">設定</span>
    </button>
  </header>

  <!-- 設定パネル -->
  <section id="settingsPanel" class="settings-panel" hidden>
    <div class="field">
      <label for="langSelect">文字起こしの言語</label>
      <select id="langSelect">
        <option value="japanese" selected>日本語 (ja)</option>
        <option value="chinese">中国語 (zh)</option>
        <option value="english">英語 (en)</option>
        <option value="auto">自動判定</option>
      </select>
    </div>
    <div class="field">
      <label for="modelSelect">Whisper モデル</label>
      <select id="modelSelect">
        <option value="Xenova/whisper-tiny" selected>tiny（軽量・高速 / 精度低め）</option>
        <option value="Xenova/whisper-base">base（やや重い / 精度やや高め）</option>
      </select>
    </div>
    <p class="hint">初回はモデル（数十MB〜）をダウンロードします。音声はブラウザ内で処理され、外部へ送信されません。</p>
  </section>

  <main class="layout">
    <!-- 左カラム: 録音・文字起こし -->
    <section class="panel" aria-labelledby="recTitle">
      <h2 id="recTitle" class="panel-title"><span class="dot dot-rec"></span>録音・文字起こし</h2>

      <div class="record-stage">
        <button id="recordBtn" class="record-btn" type="button" aria-label="録音開始">
          <span class="rec-ring" aria-hidden="true"></span>
          <span class="rec-icon" aria-hidden="true"></span>
        </button>
        <div class="record-meta">
          <div class="timer" id="timer" aria-live="polite">00:00</div>
          <div class="rec-hint" id="recHint">タップして録音開始</div>
        </div>
      </div>

      <canvas id="waveform" class="waveform" width="600" height="72" aria-hidden="true"></canvas>

      <div id="statusBar" class="status-bar" role="status" aria-live="polite">
        <span id="modelStatus" class="status-chip">モデル未読み込み</span>
        <div class="progress" hidden id="progressWrap">
          <div class="progress-bar" id="progressBar"></div>
        </div>
      </div>

      <div id="errorBox" class="error-box" hidden></div>

      <!-- 録音の再生＆音声ファイル出力 -->
      <div class="audio-card" id="audioWrap" hidden>
        <div class="mini-label-row">
          <span class="mini-label"><span aria-hidden="true">🎧</span> 録音した音声</span>
          <span class="audio-size" id="audioSize"></span>
        </div>
        <audio id="player" controls preload="metadata"></audio>
        <div class="audio-actions">
          <button class="chip-btn" id="downloadAudio" type="button"><span aria-hidden="true">⬇</span> 音声を保存</button>
          <button class="chip-btn" id="downloadWav" type="button"><span aria-hidden="true">🎵</span> WAVに変換</button>
        </div>
      </div>

      <div class="transcript-block">
        <div class="mini-label-row">
          <label class="mini-label" for="liveTranscript">文字起こし（録音中に逐次表示 / 手直し可）</label>
          <button id="clearTranscript" class="link-btn" type="button">クリア</button>
        </div>
        <textarea id="liveTranscript" class="transcript" placeholder="ここに文字起こしが表示されます。録音を止めた後、そのまま編集して議事録を生成できます。"></textarea>
      </div>
    </section>

    <!-- 右カラム: 議事録 -->
    <section class="panel" aria-labelledby="minTitle">
      <h2 id="minTitle" class="panel-title"><span class="dot dot-min"></span>議事録</h2>

      <div class="meta-grid">
        <div class="field">
          <label for="meetingName">会議名</label>
          <input id="meetingName" type="text" placeholder="例: 定例ミーティング" />
        </div>
        <div class="field">
          <label for="meetingDate">日付</label>
          <input id="meetingDate" type="date" />
        </div>
      </div>

      <div class="gen-row">
        <button id="generateBtn" class="primary-btn" type="button"><span aria-hidden="true">✨</span> 議事録を生成</button>
        <button id="regenerateBtn" class="secondary-btn" type="button"><span aria-hidden="true">↻</span> 再生成</button>
      </div>

      <div class="minutes-section">
        <label class="mini-label" for="secSummary"><span class="tag tag-sum">要点・見出し</span></label>
        <textarea id="secSummary" class="minutes-area" rows="4" placeholder="会議の要点がここに入ります。"></textarea>
      </div>
      <div class="minutes-section">
        <label class="mini-label" for="secDecisions"><span class="tag tag-dec">決定事項</span></label>
        <textarea id="secDecisions" class="minutes-area" rows="4" placeholder="決まったことがここに入ります。"></textarea>
      </div>
      <div class="minutes-section">
        <label class="mini-label" for="secTodos"><span class="tag tag-todo">ToDo</span></label>
        <textarea id="secTodos" class="minutes-area" rows="4" placeholder="やること・宿題がここに入ります。"></textarea>
      </div>

      <div class="export-block">
        <span class="export-heading">書き出し</span>
        <div class="export-row">
          <button class="export-btn" id="exportTxt" type="button"><span aria-hidden="true">📄</span> .txt</button>
          <button class="export-btn" id="exportMd" type="button"><span aria-hidden="true">📝</span> .md</button>
          <button class="export-btn" id="exportDocx" type="button"><span aria-hidden="true">📘</span> Word</button>
          <button class="export-btn" id="exportMail" type="button"><span aria-hidden="true">✉</span> メール下書き</button>
          <button class="export-btn save" id="saveMinutes" type="button"><span aria-hidden="true">💾</span> 一覧に保存</button>
        </div>
      </div>
    </section>

    <!-- 過去の議事録一覧 -->
    <section class="panel history" aria-labelledby="histTitle">
      <h2 id="histTitle" class="panel-title"><span class="dot dot-hist"></span>過去の議事録</h2>
      <ul id="historyList" class="history-list"></ul>
    </section>
  </main>

  <footer class="app-footer">
    <p>ブラウザ内で完結（サーバ不要）。文字起こしは <a href="https://github.com/xenova/transformers.js" target="_blank" rel="noopener">Transformers.js</a> の Whisper を利用。これはPoCサンプルです。</p>
  </footer>

  <!-- docx-js (Word 出力) を CDN から読み込み -->
  <script src="https://cdn.jsdelivr.net/npm/docx@8.5.0/build/index.umd.js"></script>
  <script src="./app.js" type="module"></script>
</body>
</html>

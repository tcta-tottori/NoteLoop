<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="color-scheme" content="light dark" />
  <title>NoteLoop — 議事録自動化</title>
  <meta name="description" content="ブラウザだけで完結する議事録自動化アプリ。録音 → 文字起こし → 議事録整形 → txt / Word / メール下書きで出力。" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <header class="app-header">
    <div class="brand">
      <span class="brand-mark" aria-hidden="true">🔁</span>
      <div class="brand-text">
        <h1>NoteLoop</h1>
        <p>録音 → 文字起こし → 議事録 → 出力を、ブラウザだけで</p>
      </div>
    </div>
    <button id="settingsToggle" class="ghost-btn" type="button" aria-expanded="false" aria-controls="settingsPanel">⚙ 設定</button>
  </header>

  <!-- 設定パネル -->
  <section id="settingsPanel" class="settings-panel" hidden>
    <div class="field">
      <label for="langSelect">文字起こしの言語</label>
      <select id="langSelect">
        <option value="japanese" selected>日本語 (ja)</option>
        <option value="chinese">中国語 (zh)</option>
        <option value="english">英語 (en)</option>
        <option value="auto">自動判定</option>
      </select>
    </div>
    <div class="field">
      <label for="modelSelect">Whisper モデル</label>
      <select id="modelSelect">
        <option value="Xenova/whisper-tiny" selected>tiny（軽量・高速 / 精度低め）</option>
        <option value="Xenova/whisper-base">base（やや重い / 精度やや高め）</option>
      </select>
    </div>
    <p class="hint">初回はモデル（数十MB〜）をダウンロードします。音声はブラウザ内で処理され、外部へ送信されません。</p>
  </section>

  <main class="layout">
    <!-- 左カラム: 録音・文字起こし -->
    <section class="panel" aria-labelledby="recTitle">
      <h2 id="recTitle" class="panel-title">🎙 録音・文字起こし</h2>

      <div class="record-controls">
        <button id="recordBtn" class="record-btn" type="button">
          <span class="rec-dot" aria-hidden="true"></span>
          <span class="rec-label">録音開始</span>
        </button>
        <div class="timer" id="timer" aria-live="polite">00:00</div>
      </div>

      <canvas id="waveform" class="waveform" width="600" height="80" aria-hidden="true"></canvas>

      <div id="statusBar" class="status-bar" role="status" aria-live="polite">
        <span id="modelStatus" class="status-chip">モデル未読み込み</span>
        <div class="progress" hidden id="progressWrap">
          <div class="progress-bar" id="progressBar"></div>
        </div>
      </div>

      <div id="errorBox" class="error-box" hidden></div>

      <div class="audio-wrap" id="audioWrap" hidden>
        <label class="mini-label">録音の再生</label>
        <audio id="player" controls preload="metadata"></audio>
      </div>

      <div class="transcript-block">
        <div class="mini-label-row">
          <label class="mini-label" for="liveTranscript">文字起こし（録音中に逐次表示 / 手直し可）</label>
          <button id="clearTranscript" class="link-btn" type="button">クリア</button>
        </div>
        <textarea id="liveTranscript" class="transcript" placeholder="ここに文字起こしが表示されます。録音を止めた後、そのまま編集して議事録を生成できます。"></textarea>
      </div>
    </section>

    <!-- 右カラム: 議事録 -->
    <section class="panel" aria-labelledby="minTitle">
      <h2 id="minTitle" class="panel-title">📝 議事録</h2>

      <div class="meta-grid">
        <div class="field">
          <label for="meetingName">会議名</label>
          <input id="meetingName" type="text" placeholder="例: 定例ミーティング" />
        </div>
        <div class="field">
          <label for="meetingDate">日付</label>
          <input id="meetingDate" type="date" />
        </div>
      </div>

      <div class="gen-row">
        <button id="generateBtn" class="primary-btn" type="button">議事録を生成</button>
        <button id="regenerateBtn" class="secondary-btn" type="button">再生成</button>
      </div>

      <div class="minutes-section">
        <label class="mini-label" for="secSummary">要点・見出し</label>
        <textarea id="secSummary" class="minutes-area" rows="4" placeholder="会議の要点がここに入ります。"></textarea>
      </div>
      <div class="minutes-section">
        <label class="mini-label" for="secDecisions">決定事項</label>
        <textarea id="secDecisions" class="minutes-area" rows="4" placeholder="決まったことがここに入ります。"></textarea>
      </div>
      <div class="minutes-section">
        <label class="mini-label" for="secTodos">ToDo</label>
        <textarea id="secTodos" class="minutes-area" rows="4" placeholder="やること・宿題がここに入ります。"></textarea>
      </div>

      <div class="export-row">
        <button class="export-btn" id="exportTxt" type="button">.txt</button>
        <button class="export-btn" id="exportMd" type="button">.md</button>
        <button class="export-btn" id="exportDocx" type="button">.docx (Word)</button>
        <button class="export-btn" id="exportMail" type="button">✉ メール下書き</button>
        <button class="export-btn save" id="saveMinutes" type="button">💾 一覧に保存</button>
      </div>
    </section>

    <!-- 過去の議事録一覧 -->
    <section class="panel history" aria-labelledby="histTitle">
      <h2 id="histTitle" class="panel-title">🗂 過去の議事録</h2>
      <ul id="historyList" class="history-list"></ul>
    </section>
  </main>

  <footer class="app-footer">
    <p>ブラウザ内で完結（サーバ不要）。文字起こしは <a href="https://github.com/xenova/transformers.js" target="_blank" rel="noopener">Transformers.js</a> の Whisper を利用。これはPoCサンプルです。</p>
  </footer>

  <!-- docx-js (Word 出力) を CDN から読み込み -->
  <script src="https://cdn.jsdelivr.net/npm/docx@8.5.0/build/index.umd.js"></script>
  <script src="./app.js" type="module"></script>
</body>
</html>
